<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect sub-paths back to the SPA root so React Router can handle them
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '')) +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
</html>
